name: Sally Daily Run

on:
  # Production daily runs are triggered by cron-job.org only (Mon-Fri at
  # 6 AM, 9 AM, 2 PM PT). DO NOT add a GitHub Actions schedule that fires
  # mode=daily here — that would create overlapping production runs.
  schedule:
    - cron: '15 23 * * *'   # 7:15 PM ET — duplicate-review (after both daily runs settle)
    - cron: '30 1 * * *'    # 9:30 PM ET — buyer-branding-backfill --missing
    - cron: '0 2 * * *'     # 10:00 PM ET — process-deal-flags (reader-submitted flags)
    - cron: '30 2 * * *'    # 10:30 PM ET — resolve-needs-review (clear stuck verification stragglers)
    - cron: '30 6 * * 3'    # 2:30 AM ET Wednesday — brand-api-smoke (weekly health check)
    - cron: '30 9 * * 0'    # 5:30 AM ET Sunday — rss-discovery (weekly)
    - cron: '0 11 * * 0'    # 7:00 AM ET Sunday — promote-tiers (weekly)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - brand-api-smoke
          - duplicate-review
          - buyer-branding-backfill
          - rss-discovery
          - deal-brief-backfill
          - process-deal-flags
          - sector-tag-backfill
          - resolve-needs-review
          - promote-tiers
      buyer_branding_limit:
        description: 'Max deals to inspect for buyer branding backfill / duplicate review'
        required: false
        default: '250'
      buyer_branding_force:
        description: 'Force refresh cached buyer domains'
        required: false
        default: true
        type: boolean
      buyer_branding_missing_only:
        description: 'Only inspect deals with missing buyer_domain'
        required: false
        default: false
        type: boolean
      sector_tag_limit:
        description: 'Max deals to tag for normalized sector backfill'
        required: false
        default: '600'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve_mode:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.pick.outputs.mode }}
      buyer_branding_limit: ${{ steps.pick.outputs.buyer_branding_limit }}
      buyer_branding_force: ${{ steps.pick.outputs.buyer_branding_force }}
      buyer_branding_missing_only: ${{ steps.pick.outputs.buyer_branding_missing_only }}
      sector_tag_limit: ${{ steps.pick.outputs.sector_tag_limit }}
    steps:
      - id: pick
        name: Pick run mode based on cron schedule or manual dispatch
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "buyer_branding_limit=${{ inputs.buyer_branding_limit }}" >> "$GITHUB_OUTPUT"
            echo "buyer_branding_force=${{ inputs.buyer_branding_force }}" >> "$GITHUB_OUTPUT"
            echo "buyer_branding_missing_only=${{ inputs.buyer_branding_missing_only }}" >> "$GITHUB_OUTPUT"
            echo "sector_tag_limit=${{ inputs.sector_tag_limit }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${{ github.event.schedule }}" in
            "15 23 * * *")
              echo "mode=duplicate-review" >> "$GITHUB_OUTPUT"
              echo "buyer_branding_limit=250" >> "$GITHUB_OUTPUT"
              ;;
            "30 1 * * *")
              echo "mode=buyer-branding-backfill" >> "$GITHUB_OUTPUT"
              echo "buyer_branding_limit=250" >> "$GITHUB_OUTPUT"
              echo "buyer_branding_force=false" >> "$GITHUB_OUTPUT"
              echo "buyer_branding_missing_only=true" >> "$GITHUB_OUTPUT"
              ;;
            "0 2 * * *")
              echo "mode=process-deal-flags" >> "$GITHUB_OUTPUT"
              ;;
            "30 2 * * *")
              echo "mode=resolve-needs-review" >> "$GITHUB_OUTPUT"
              ;;
            "30 6 * * 3")
              echo "mode=brand-api-smoke" >> "$GITHUB_OUTPUT"
              ;;
            "30 9 * * 0")
              echo "mode=rss-discovery" >> "$GITHUB_OUTPUT"
              ;;
            "0 11 * * 0")
              echo "mode=promote-tiers" >> "$GITHUB_OUTPUT"
              ;;
            *)
              # NEVER fall through to mode=daily for an unmapped schedule.
              # That would silently spawn an unintended production run.
              # If you add a new cron entry above, add an explicit case here.
              echo "Unknown cron schedule: '${{ github.event.schedule }}'. Refusing to run." >&2
              exit 1
              ;;
          esac

  run:
    needs: resolve_mode
    runs-on: ubuntu-latest
    timeout-minutes: 120

    defaults:
      run:
        working-directory: sally-news-analyst

    steps:
      - name: Echo selected mode
        run: echo "Running mode=${{ needs.resolve_mode.outputs.mode }}"
        working-directory: .

      - name: Checkout private Sally repo
        uses: actions/checkout@v4
        with:
          repository: colesterrett/sally-news-analyst
          token: ${{ secrets.SALLY_REPO_PAT }}
          path: sally-news-analyst

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: sally-news-analyst/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Sally (daily)
        if: ${{ needs.resolve_mode.outputs.mode == 'daily' }}
        run: npm start
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ENABLE_FIRECRAWL: ${{ vars.ENABLE_FIRECRAWL }}
          MAX_FIRECRAWL_SOURCES_PER_RUN: ${{ vars.MAX_FIRECRAWL_SOURCES_PER_RUN || '3' }}
          LOGO_DEV_SECRET_KEY: ${{ secrets.LOGO_DEV_SECRET_KEY }}
          BRANDFETCH_CLIENT_ID: ${{ secrets.BRANDFETCH_CLIENT_ID }}
          BRANDFETCH_API_KEY: ${{ secrets.BRANDFETCH_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          FAST_MODEL: ${{ vars.FAST_MODEL }}
          EDITOR_MODEL: ${{ vars.EDITOR_MODEL }}
          MIN_NEW_DEALS_TO_PUBLISH: ${{ vars.MIN_NEW_DEALS_TO_PUBLISH || '3' }}
          MIN_PUBLISHED_DAY_DEALS: ${{ vars.MIN_PUBLISHED_DAY_DEALS || '3' }}
          LEAD_STORY_RESELECT_MODE: ${{ vars.LEAD_STORY_RESELECT_MODE || 'preserve' }}
          LOW_CONFIDENCE_MAX_LLM_DEALS: ${{ vars.LOW_CONFIDENCE_MAX_LLM_DEALS || '40' }}
          MONITORED_MAX_NEW_CANDIDATES: ${{ vars.MONITORED_MAX_NEW_CANDIDATES || '300' }}
          MIN_ANNOUNCED_DATE: ${{ vars.MIN_ANNOUNCED_DATE }}
          MONITORED_MAX_LLM_ARTICLES: ${{ vars.MONITORED_MAX_LLM_ARTICLES || '100' }}
          MONITORED_LLM_CONCURRENCY: ${{ vars.MONITORED_LLM_CONCURRENCY || '2' }}

      - name: Smoke test brand APIs
        if: ${{ needs.resolve_mode.outputs.mode == 'brand-api-smoke' }}
        run: npm run smoke-brand-apis
        env:
          LOGO_DEV_SECRET_KEY: ${{ secrets.LOGO_DEV_SECRET_KEY }}
          BRANDFETCH_CLIENT_ID: ${{ secrets.BRANDFETCH_CLIENT_ID }}
          BRANDFETCH_API_KEY: ${{ secrets.BRANDFETCH_API_KEY }}

      - name: Backfill buyer branding
        if: ${{ needs.resolve_mode.outputs.mode == 'buyer-branding-backfill' }}
        run: |
          ARGS="--limit=${{ needs.resolve_mode.outputs.buyer_branding_limit }}"
          if [ "${{ needs.resolve_mode.outputs.buyer_branding_force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ needs.resolve_mode.outputs.buyer_branding_missing_only }}" = "true" ]; then
            ARGS="$ARGS --missing"
          fi
          npm run backfill-buyer-branding -- $ARGS
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          LOGO_DEV_SECRET_KEY: ${{ secrets.LOGO_DEV_SECRET_KEY }}
          BRANDFETCH_CLIENT_ID: ${{ secrets.BRANDFETCH_CLIENT_ID }}
          BRANDFETCH_API_KEY: ${{ secrets.BRANDFETCH_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          FAST_MODEL: ${{ vars.FAST_MODEL }}

      - name: Review recent duplicates
        if: ${{ needs.resolve_mode.outputs.mode == 'duplicate-review' }}
        run: npm run review-recent-duplicates -- --limit=${{ needs.resolve_mode.outputs.buyer_branding_limit }}
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          FAST_MODEL: ${{ vars.FAST_MODEL }}

      - name: Discover RSS feeds
        if: ${{ needs.resolve_mode.outputs.mode == 'rss-discovery' }}
        run: npm run discover-rss
        env:
          FORCE_RSS_REFRESH: "true"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Backfill deal briefs
        if: ${{ needs.resolve_mode.outputs.mode == 'deal-brief-backfill' }}
        run: npm run backfill-deal-briefs -- --days=30
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_DEAL_BRIEFS_PER_RUN: '200'
          FAST_MODEL: ${{ vars.FAST_MODEL }}

      - name: Process reader-submitted deal flags
        if: ${{ needs.resolve_mode.outputs.mode == 'process-deal-flags' }}
        run: npm run process-deal-flags
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Backfill normalized sector tags
        if: ${{ needs.resolve_mode.outputs.mode == 'sector-tag-backfill' }}
        run: npm run backfill-sector-tags -- --limit=${{ needs.resolve_mode.outputs.sector_tag_limit }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Promote source tiers
        if: ${{ needs.resolve_mode.outputs.mode == 'promote-tiers' }}
        run: npm run promote-tiers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Resolve stuck needs-review deals
        if: ${{ needs.resolve_mode.outputs.mode == 'resolve-needs-review' }}
        run: npm run resolve-needs-review -- --limit=500
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          FAST_MODEL: ${{ vars.FAST_MODEL }}
          REVIEW_MODEL: ${{ vars.REVIEW_MODEL }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sally-run-${{ github.run_id }}-${{ needs.resolve_mode.outputs.mode }}
          path: sally-news-analyst/runs/
          retention-days: 14

      - name: Revalidate Buyout Desk cache
        if: ${{ success() && needs.resolve_mode.outputs.mode == 'daily' }}
        run: |
          curl -s -X POST "https://buyout-desk.vercel.app/api/revalidate?secret=${{ secrets.REVALIDATE_SECRET }}" || true

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST -H 'Content-Type: application/json' \
            -d '{"text":"Sally ${{ needs.resolve_mode.outputs.mode }} run failed. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true
