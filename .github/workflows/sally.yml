name: Sally Daily Run

on:
  schedule:
    - cron: '37 13 * * *'   # Primary morning run: 9:37 AM ET during daylight time
    - cron: '7 14 * * *'    # Morning backup if GitHub drops/delays the primary
    - cron: '37 14 * * *'   # Final morning backup
    - cron: '7 21 * * *'    # Primary evening run: 5:07 PM ET during daylight time
    - cron: '37 21 * * *'   # Evening backup
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - brand-api-smoke
          - duplicate-review
          - buyer-branding-backfill
          - rss-discovery
      buyer_branding_limit:
        description: 'Max deals to inspect for buyer branding backfill / duplicate review'
        required: false
        default: '250'
      buyer_branding_force:
        description: 'Force refresh cached buyer domains'
        required: false
        default: true
        type: boolean
      buyer_branding_missing_only:
        description: 'Only inspect deals with missing buyer_domain'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read

concurrency:
  group: sally-daily-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Decide whether scheduled backup should run
        id: schedule_guard
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          echo "should_run=true" >> "$GITHUB_OUTPUT"

          if [ "$EVENT_NAME" != "schedule" ]; then
            exit 0
          fi

          case "$SCHEDULE" in
            "7 14 * * *"|"37 14 * * *")
              window_hours=3
              ;;
            "37 21 * * *")
              window_hours=2
              ;;
            *)
              exit 0
              ;;
          esac

          cutoff="$(date -u -d "$window_hours hours ago" +"%Y-%m-%dT%H:%M:%SZ")"
          recent_success_count="$(
            gh run list \
              --repo "$REPO" \
              --workflow "sally.yml" \
              --status success \
              --limit 20 \
              --json databaseId,createdAt \
              --jq "[.[] | select(.databaseId != ($RUN_ID | tonumber) and .createdAt > \"$cutoff\")] | length"
          )"

          if [ "$recent_success_count" -gt 0 ]; then
            echo "A successful Sally run already completed within the backup window; skipping this backup schedule."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout private Sally repo
        if: steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          repository: colesterrett/sally-news-analyst
          token: ${{ secrets.SALLY_REPO_PAT }}
          path: sally-news-analyst

      - uses: actions/setup-node@v4
        if: steps.schedule_guard.outputs.should_run == 'true'
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: sally-news-analyst/package-lock.json

      - name: Install dependencies
        if: steps.schedule_guard.outputs.should_run == 'true'
        working-directory: sally-news-analyst
        run: npm ci

      - name: Build
        if: steps.schedule_guard.outputs.should_run == 'true'
        working-directory: sally-news-analyst
        run: npm run build

      - name: Run Sally
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' && (github.event_name != 'workflow_dispatch' || inputs.mode == 'daily') }}
        working-directory: sally-news-analyst
        run: npm start
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          LOGO_DEV_SECRET_KEY: ${{ secrets.LOGO_DEV_SECRET_KEY }}
          BRANDFETCH_CLIENT_ID: ${{ secrets.BRANDFETCH_CLIENT_ID }}
          BRANDFETCH_API_KEY: ${{ secrets.BRANDFETCH_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          EDITOR_MODEL: ${{ vars.EDITOR_MODEL }}
          OLLAMA_TIMEOUT_MS: "75000"
          OLLAMA_MAX_RETRIES: "1"
          AGENT_SCANNER_TIMEOUT_MS: "240000"
          CRITICAL_LOOKBACK_DAYS: "2"
          CRITICAL_BATCH_SIZE: "40"
          CRITICAL_MAX_HEADLINES: "80"
          MONITORED_LLM_CONCURRENCY: "1"
          MONITORED_BATCH_SIZE: "12"
          MONITORED_MAX_NEW_CANDIDATES: "160"
          MONITORED_MAX_LLM_ARTICLES: "84"
          MAX_LOW_FIDELITY_ENRICHMENTS: "25"
          DUPLICATE_REVIEW_MAX_GROUPS: "8"
          BUYER_BRANDING_CONCURRENCY: "1"
          BUYER_BRANDING_MAX_RESOLUTIONS: "30"
          DISPLAY_COPY_CONCURRENCY: "1"
          DISPLAY_COPY_MAX_LLM_DEALS: "20"

      - name: Smoke test brand APIs
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && inputs.mode == 'brand-api-smoke' }}
        working-directory: sally-news-analyst
        run: npm run smoke-brand-apis
        env:
          LOGO_DEV_SECRET_KEY: ${{ secrets.LOGO_DEV_SECRET_KEY }}
          BRANDFETCH_CLIENT_ID: ${{ secrets.BRANDFETCH_CLIENT_ID }}
          BRANDFETCH_API_KEY: ${{ secrets.BRANDFETCH_API_KEY }}

      - name: Backfill buyer branding
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && inputs.mode == 'buyer-branding-backfill' }}
        working-directory: sally-news-analyst
        run: |
          ARGS="--limit=${{ inputs.buyer_branding_limit }}"
          if [ "${{ inputs.buyer_branding_force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ inputs.buyer_branding_missing_only }}" = "true" ]; then
            ARGS="$ARGS --missing"
          fi
          npm run backfill-buyer-branding -- $ARGS
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          LOGO_DEV_SECRET_KEY: ${{ secrets.LOGO_DEV_SECRET_KEY }}
          BRANDFETCH_CLIENT_ID: ${{ secrets.BRANDFETCH_CLIENT_ID }}
          BRANDFETCH_API_KEY: ${{ secrets.BRANDFETCH_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}

      - name: Review recent duplicates
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && inputs.mode == 'duplicate-review' }}
        working-directory: sally-news-analyst
        run: npm run review-recent-duplicates -- --limit=${{ inputs.buyer_branding_limit }}
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}

      - name: Discover RSS feeds
        if: ${{ steps.schedule_guard.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && inputs.mode == 'rss-discovery' }}
        working-directory: sally-news-analyst
        run: npm run discover-rss
        env:
          FORCE_RSS_REFRESH: "true"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload run artifacts
        if: ${{ always() && steps.schedule_guard.outputs.should_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: sally-run-${{ github.run_id }}
          path: sally-news-analyst/runs/
          retention-days: 14

      - name: Revalidate Buyout Desk cache
        if: ${{ success() && steps.schedule_guard.outputs.should_run == 'true' }}
        run: |
          curl -s -X POST "https://buyout-desk.vercel.app/api/revalidate?secret=${{ secrets.REVALIDATE_SECRET }}" || true

      - name: Notify Slack on failure
        if: ${{ failure() && steps.schedule_guard.outputs.should_run == 'true' }}
        run: |
          curl -s -X POST -H 'Content-Type: application/json' \
            -d '{"text":"Sally Daily Run failed. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || true
